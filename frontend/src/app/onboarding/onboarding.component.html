<div class="scOnboard">

  <h1 class="scOnboardTitle">A reminder app built<br>for people, together.</h1>

  <div class="scOnboardList">
    @for (item of items; track item.title) {
      <div class="scOnboardItem">
        <div class="scOnboardIcon" [innerHTML]="item.icon | safeHtml"></div>
        <div>
          <div class="scOnboardItemTitle">{{ item.title }}</div>
          <div class="scOnboardItemBody">{{ item.body }}</div>
        </div>
      </div>
    }
  </div>

  <!-- Gender / avatar picker -->
  <div class="scOnboardAvatarSection">
    <div class="scOnboardAvatarLabel">CHOOSE YOUR PROFILE PICTURE</div>
    <div class="scOnboardAvatarRow">
      <button class="scOnboardAvatarCard"
              [class.selected]="selectedGender() === 'male'"
              (click)="selectGender('male')">
        <div class="scOnboardAvatarCircle male">M</div>
        <div class="scOnboardAvatarName">Male</div>
      </button>
      <button class="scOnboardAvatarCard"
              [class.selected]="selectedGender() === 'female'"
              (click)="selectGender('female')">
        <div class="scOnboardAvatarCircle female">F</div>
        <div class="scOnboardAvatarName">Female</div>
      </button>
    </div>
  </div>

  <div class="scOnboardSpacer"></div>

  <button class="scOnboardBtn" (click)="enterApp()">Get started</button>

</div>
