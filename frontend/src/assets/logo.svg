<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 100" fill="none">
  <defs>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#3D5AF1" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- Icon squircle background (blue) -->
  <rect x="0" y="4" width="92" height="92" rx="22" fill="#3D5AF1" filter="url(#softShadow)"/>

