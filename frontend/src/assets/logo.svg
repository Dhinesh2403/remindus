<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 100" fill="none">
  <defs>
    <linearGradient id="iconBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#9333EA"/>
    </linearGradient>
    <linearGradient id="bellGlow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="1"/>
      <stop offset="100%" stop-color="#EDE9FE" stop-opacity="0.9"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#7C3AED" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- Icon squircle background -->
  <rect x="0" y="4" width="92" height="92" rx="22" fill="url(#iconBg)" filter="url(#softShadow)"/>

  <!-- Bell body -->
  <path d="M46 20
    C34 20 26 29 26 41
    L26 60
    L20 68
    L72 68
    L66 60
    L66 41
    C66 29 58 20 46 20 Z"
    fill="url(#bellGlow)"/>

  <!-- Bell clapper / base -->
  <path d="M38 68 C38 72.4 41.6 76 46 76 C50.4 76 54 72.4 54 68 Z"
    fill="url(#bellGlow)"/>

  <!-- Bell stem / top knob -->
  <rect x="43" y="13" width="6" height="9" rx="3" fill="url(#bellGlow)"/>

  <!-- Notification dot (pink accent) -->
  <circle cx="66" cy="26" r="10" fill="#EC4899"/>
  <circle cx="66" cy="26" r="6" fill="white" opacity="0.3"/>
  <!-- Dot center -->
  <circle cx="66" cy="26" r="3.5" fill="white"/>

  <!-- Wordmark: "RemindUs" — single text so "Us" always flows right after "Remind"
       regardless of which fallback font the device uses -->
  <text x="108" y="52"
    font-family="'Nunito', 'DM Sans', system-ui, sans-serif"
    font-size="30"
    font-weight="800"
    letter-spacing="-0.5"><tspan fill="#7C3AED">Remind</tspan><tspan fill="#5B21B6">Us</tspan></text>

  <!-- Tagline -->
  <text x="108" y="70"
    font-family="'DM Sans', system-ui, sans-serif"
    font-size="12"
    font-weight="500"
    fill="#9CA3AF"
    letter-spacing="0.5">Smart Reminders · Stay Accountable</text>
</svg>
