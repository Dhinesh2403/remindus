  <rect x="20" y="24" width="52" height="52" rx="14" fill="#5B7CFF"/>
  <rect x="20" y="24" width="52" height="52" rx="14" fill="#FFFFFF" fill-opacity="0.10"/>

  <!-- Bell stem -->
